name: Release Build

on:
  push:
    # 只有当推送以 'v' 开头的 tag 时才触发，例如 v1.2.3
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          # Windows 64位
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: my-app-windows-x64.exe
          
          # macOS Intel (x86)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: my-app-macos-x64
          
          # macOS Apple Silicon (M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: my-app-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Optional)
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv target/${{ matrix.target }}/release/opentako.exe ${{ matrix.artifact_name }}
          else
            mv target/${{ matrix.target }}/release/opentako ${{ matrix.artifact_name }}
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}